<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Savings</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="dashboard">
    <aside class="sidebar">
      <h2>Menu</h2>
      <ul>
        <li><a href="../index.html">Overview</a></li>
        <li><a href="saving.html">Saving</a></li>
        <li><a href="payment.html">Payment</a></li>
      </ul>
    </aside>

    <section class="main-content">
      <header><h1>Add Savings</h1></header>
      <div class="card">
        <form id="savingForm">
        <label>Date:</label>
        <input type="date" id="savingDate" required>
        <label>Category:</label>
        <select id="savingCategory" required>
          <option>Mutual Fund</option>
          <option>LIC</option>
          <option>PPF</option>
          <option>Sukanya</option>
          <option>Bank</option>
          <option>Other</option>
        </select>
        <label>Amount (₹):</label>
        <input type="number" id="savingAmount" required>
        <button type="submit">Add Saving</button>
      </form>

      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Month-Year</th>
            <th>Category</th>
            <th>Amount</th>
          </tr>
        </thead>
        <tbody id="savingTableBody"></tbody>
      </table>

      <button id="exportExcel">Download Excel</button>

      </div>
    </section>
  </div>

  <script src="../js/script.js"></script>
</body>
</html>
